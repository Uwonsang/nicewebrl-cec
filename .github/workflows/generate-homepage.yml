name: Generate Homepage

on:
  push:
    branches:
      - main
    paths:
      - 'home/environments.csv'
      - 'home/generate_html.py'

jobs:
  generate-html:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate HTML
        run: |
          cd home
          python generate_html.py

      - name: Copy HTML to root
        run: |
          cp home/index.html index.html

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add index.html
          git diff --staged --quiet || git commit -m "Update homepage from environments data"
          git push
